<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cholo Krause: Electronic arts. - Detalle de producto</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="logo">Cholo Krause: Electronic arts.</div>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="productos.html">Productos</a>
        <a href="armatupc.html">Arma tu PC</a>
    </nav>
    <div class="buscador">
        <input type="text" id="globalSearch" placeholder="Buscar...">
    </div>
    <div class="usuario">
        <a href="login.html">
            <svg class="user-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="8" r="4" stroke="white" stroke-width="1.5"/>
                <path d="M5 20v-2a7 7 0 0 1 14 0v2" stroke="white" stroke-width="1.5"/>
            </svg>
        </a>
        <span class="user-name" id="userNameDisplay"></span>
    </div>
</header>

<main>
    <div class="main-container">
        <div class="breadcrumb">
            <a href="index.html">Inicio</a> &gt;
            <a href="productos.html">Productos</a> &gt;
            <span id="breadcrumbCategory"></span> &gt;
            <span id="productNameSpan"></span>
        </div>
        <div id="detailContainer" class="product-detail-wrapper"></div>
    </div>
</main>

<footer>
    <p>Cholo Krause: Electronic arts.</p>
</footer>

<div class="floating-menu-container">
    <button class="floating-button">☰</button>
    <div class="floating-menu">
        <a href="carrito.html">Carrito</a>
        <a href="favoritos.html">Favoritos</a>
        <a href="preguntasfrecuentes.html">FAQ</a>
        <a href="contacto.html">Contacto</a>
    </div>
</div>

<script src="database.js"></script>
<script>
    // Obtener producto por ID
    const urlParams = new URLSearchParams(window.location.search);
    const productId = parseInt(urlParams.get('id'));
    const producto = getProductById(productId);
    const userNameSpan = document.getElementById('userNameDisplay');
    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (currentUser) userNameSpan.textContent = currentUser.name;

    // Para el breadcrumb, determinar categoría (búsqueda en productosDB)
    let categoriaEncontrada = '';
    for (let cat in productosDB) {
        if (productosDB[cat].some(p => p.id === productId)) {
            categoriaEncontrada = cat;
            break;
        }
    }
    const nombresCategorias = {
        procesadores: "Procesadores",
        placas_video: "Placas de Video",
        coolers: "Coolers",
        gabinetes: "Gabinetes",
        monitores: "Monitores",
        perifericos: "Periféricos",
        motherboards: "Motherboards",
        memorias_ram: "Memorias RAM",
        almacenamiento: "Almacenamiento",
        fuentes_poder: "Fuentes de Poder",
        pc_armadas: "PC Armadas"
    };
    const nombreCategoria = nombresCategorias[categoriaEncontrada] || "Productos";
    document.getElementById('breadcrumbCategory').innerHTML = `<a href="productos-lista.html?subcategoria=${categoriaEncontrada}">${nombreCategoria}</a>`;
    document.getElementById('productNameSpan').innerHTML = producto ? producto.nombre : 'Producto no encontrado';

    if (!producto) {
        document.getElementById('detailContainer').innerHTML = `
            <div class="error-message" style="text-align:center; padding:4rem;">
                <h2>Producto no encontrado</h2>
                <p>El producto que buscas no existe o ha sido removido.</p>
                <a href="productos.html" class="btn">Ver catálogo</a>
            </div>
        `;
    } else {
        // Generar especificaciones en formato lista bonita
        let specsHtml = '<div class="specs-grid">';
        // Lista de propiedades a mostrar (excluir las que no interesan)
        const excludeKeys = ['id', 'nombre', 'precio', 'marca', 'descripcion', 'imagen'];
        for (let [key, value] of Object.entries(producto)) {
            if (excludeKeys.includes(key)) continue;
            if (value === undefined || value === null || value === '') continue;
            let displayValue = value;
            if (typeof value === 'boolean') displayValue = value ? 'Sí' : 'No';
            if (Array.isArray(value)) displayValue = value.join(', ');
            // Formatear clave para mostrar bonito
            let displayKey = key
                .replace(/_/g, ' ')
                .replace(/\b\w/g, l => l.toUpperCase());
            specsHtml += `
                <div class="spec-item">
                    <div class="spec-label">${displayKey}</div>
                    <div class="spec-value">${displayValue}</div>
                </div>
            `;
        }
        specsHtml += '</div>';

        // Construir página de detalle
        const detailHtml = `
            <div class="product-detail">
                <div class="product-detail-image">
                    <img src="imagenes/${producto.imagen}" alt="${producto.nombre}" onerror="this.src='imagenes/placeholder.jpg'">
                </div>
                <div class="product-detail-info">
                    <h1 class="product-detail-title">${producto.nombre}</h1>
                    <div class="product-detail-brand">${producto.marca}</div>
                    <div class="product-detail-price">$${producto.precio.toLocaleString()} <small>IVA incluido</small></div>
                    <div class="product-detail-description">${producto.descripcion}</div>
                    <div class="quantity-selector">
                        <label for="cantidad">Cantidad:</label>
                        <div class="quantity-control">
                            <button class="quantity-btn" id="minusBtn">-</button>
                            <input type="number" id="cantidad" value="1" min="1" max="10">
                            <button class="quantity-btn" id="plusBtn">+</button>
                        </div>
                    </div>
                    <div class="product-detail-buttons">
                        <button class="btn btn-primary" id="comprarAhoraBtn">Comprar ahora</button>
                        <button class="btn btn-secondary" id="agregarCarritoBtn">Agregar al carrito</button>
                        <button class="btn btn-outline" id="favoritoBtn">Favorito</button>
                    </div>
                </div>
                <div class="product-detail-specs">
                    <h3>Especificaciones técnicas</h3>
                    ${specsHtml}
                </div>
            </div>
        `;
        document.getElementById('detailContainer').innerHTML = detailHtml;

        // Lógica de cantidad
        const cantidadInput = document.getElementById('cantidad');
        document.getElementById('minusBtn').addEventListener('click', () => {
            let val = parseInt(cantidadInput.value);
            if (val > 1) cantidadInput.value = val - 1;
        });
        document.getElementById('plusBtn').addEventListener('click', () => {
            let val = parseInt(cantidadInput.value);
            if (val < 10) cantidadInput.value = val + 1;
        });

        // Botones de acción
        function agregarAlCarrito() {
            const cantidad = parseInt(cantidadInput.value);
            let carrito = JSON.parse(localStorage.getItem('carrito')) || [];
            const existente = carrito.find(item => item.id === producto.id);
            if (existente) {
                existente.cantidad = (existente.cantidad || 1) + cantidad;
            } else {
                carrito.push({ ...producto, cantidad: cantidad });
            }
            localStorage.setItem('carrito', JSON.stringify(carrito));
            alert(`${producto.nombre} agregado al carrito (x${cantidad})`);
        }

        function comprarAhora() {
            agregarAlCarrito();
            window.location.href = 'carrito.html';
        }

        function agregarAFavoritos() {
            let favoritos = JSON.parse(localStorage.getItem('favoritos')) || [];
            if (!favoritos.find(f => f.id === producto.id)) {
                favoritos.push(producto);
                localStorage.setItem('favoritos', JSON.stringify(favoritos));
                alert(`${producto.nombre} agregado a favoritos`);
            } else {
                alert('Este producto ya está en favoritos');
            }
        }

        document.getElementById('agregarCarritoBtn').addEventListener('click', agregarAlCarrito);
        document.getElementById('comprarAhoraBtn').addEventListener('click', comprarAhora);
        document.getElementById('favoritoBtn').addEventListener('click', agregarAFavoritos);
    }

    // Búsqueda global
    document.getElementById('globalSearch').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') {
            window.location.href = `productos-lista.html?buscar=${encodeURIComponent(e.target.value)}`;
        }
    });

    // Botón flotante
    const floatingButton = document.querySelector('.floating-button');
    const floatingMenu = document.querySelector('.floating-menu');
    if (floatingButton && floatingMenu) {
        floatingButton.addEventListener('click', (e) => {
            e.stopPropagation();
            floatingMenu.classList.toggle('show');
        });
        document.addEventListener('click', (e) => {
            if (!floatingButton.contains(e.target) && !floatingMenu.contains(e.target)) {
                floatingMenu.classList.remove('show');
            }
        });
    }
</script>
</body>
</html>
