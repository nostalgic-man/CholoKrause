<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Cholo Krause: Electronic arts. - Lista de productos</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
<header>
    <div class="logo">Cholo Krause: Electronic arts.</div>
    <nav>
        <a href="index.html">Inicio</a>
        <a href="productos.html">Productos</a>
        <a href="armatupc.html">Arma tu PC</a>
    </nav>
    <div class="buscador">
        <input type="text" id="searchInput" placeholder="Buscar...">
    </div>
    <div class="usuario">
        <a href="login.html">
            <svg class="user-icon" width="32" height="32" viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
                <circle cx="12" cy="8" r="4" stroke="white" stroke-width="1.5"/>
                <path d="M5 20v-2a7 7 0 0 1 14 0v2" stroke="white" stroke-width="1.5"/>
            </svg>
        </a>
        <span class="user-name" id="userNameDisplay"></span>
    </div>
</header>

<main>
    <div class="main-container">
        <div class="products-list-container">
            <!-- SIDEBAR IZQUIERDO -->
            <aside class="filters-sidebar">
                <h3>Filtrar productos</h3>
                
                <!-- Sección: Otras categorías (navegación rápida) -->
                <div class="filter-section">
                    <h4>Otras categorías</h4>
                    <div id="categoryLinks"></div>
                </div>

                <!-- Sección: Marcas -->
                <div class="filter-section" id="brandFilterSection">
                    <h4>Marcas</h4>
                    <div id="brandFilters"></div>
                </div>

                <!-- Sección: Filtros adicionales específicos (socket, etc.) -->
                <div class="filter-section" id="extraFilterSection"></div>

                <!-- Sección: Ordenamiento -->
                <div class="sort-section">
                    <h4>Ordenar por precio</h4>
                    <select id="sortSelect">
                        <option value="default">Default</option>
                        <option value="asc">Menor a mayor</option>
                        <option value="desc">Mayor a menor</option>
                    </select>
                </div>
            </aside>

            <!-- GRILLA DE PRODUCTOS -->
            <div class="products-grid" id="productsGrid"></div>
        </div>
    </div>
</main>

<footer>
    <p>Cholo Krause: Electronic arts.</p>
</footer>

<div class="floating-menu-container">
    <button class="floating-button">☰</button>
    <div class="floating-menu">
        <a href="carrito.html">Carrito</a>
        <a href="favoritos.html">Favoritos</a>
        <a href="preguntasfrecuentes.html">FAQ</a>
        <a href="contacto.html">Contacto</a>
    </div>
</div>

<script src="database.js"></script>
<script>
    // Lista de todas las subcategorías disponibles (provenientes de productosDB)
    const todasLasCategorias = Object.keys(productosDB).filter(key => key !== 'pc_armadas');
    const nombresCategorias = {
        procesadores: "Procesadores",
        placas_video: "Placas de Video",
        coolers: "Coolers",
        gabinetes: "Gabinetes",
        monitores: "Monitores",
        perifericos: "Periféricos",
        motherboards: "Motherboards",
        memorias_ram: "Memorias RAM",
        almacenamiento: "Almacenamiento",
        fuentes_poder: "Fuentes de Poder"
    };

    const urlParams = new URLSearchParams(window.location.search);
    let subcategoria = urlParams.get('subcategoria');
    let productos = (subcategoria && productosDB[subcategoria]) ? [...productosDB[subcategoria]] : [];
    const searchParam = urlParams.get('buscar');
    if (searchParam) {
        const term = searchParam.toLowerCase();
        productos = getAllProducts().filter(p => p.nombre.toLowerCase().includes(term));
        subcategoria = null;
    }

    // Generar enlaces de categorías en el sidebar
    function generarEnlacesCategorias() {
        const container = document.getElementById('categoryLinks');
        if (!container) return;
        let html = '<ul class="category-list">';
        for (let cat of todasLasCategorias) {
            const nombreLegible = nombresCategorias[cat] || cat;
            const activa = (subcategoria === cat);
            html += `<li><a href="productos-lista.html?subcategoria=${cat}" class="${activa ? 'active-cat' : ''}">${nombreLegible}</a></li>`;
        }
        html += '</ul>';
        container.innerHTML = html;
    }

    // Función para obtener especificaciones técnicas según categoría
    function getSpecsHTML(producto, categoria) {
        if (categoria === 'procesadores') {
            return `<div class="product-specs">Socket: ${producto.socket} | Núcleos: ${producto.nucleos} | TDP: ${producto.tdp}W</div>`;
        } else if (categoria === 'placas_video') {
            return `<div class="product-specs">VRAM: ${producto.vram} | DLSS: ${producto.dlss ? 'Si' : 'No'} | Consumo: ${producto.consumo}W</div>`;
        } else if (categoria === 'coolers') {
            return `<div class="product-specs">Tipo: ${producto.tipo} | Ruido: ${producto.ruido}</div>`;
        } else if (categoria === 'gabinetes') {
            return `<div class="product-specs">Formato: ${producto.formato} | Ventiladores: ${producto.ventiladores_incluidos}</div>`;
        } else if (categoria === 'monitores') {
            return `<div class="product-specs">Resolución: ${producto.resolucion} | Panel: ${producto.panel} | Refresco: ${producto.refresco}</div>`;
        } else if (categoria === 'perifericos') {
            return `<div class="product-specs">Tipo: ${producto.tipo}</div>`;
        } else if (categoria === 'motherboards') {
            return `<div class="product-specs">Socket: ${producto.socket} | Chipset: ${producto.chipset} | RAM: ${producto.tipo_ram}</div>`;
        } else if (categoria === 'memorias_ram') {
            return `<div class="product-specs">Capacidad: ${producto.capacidad}GB | Tipo: ${producto.tipo} | Velocidad: ${producto.velocidad}</div>`;
        } else if (categoria === 'almacenamiento') {
            return `<div class="product-specs">Tipo: ${producto.tipo} | Capacidad: ${producto.capacidad}GB | ${producto.rpm ? `${producto.rpm} RPM` : producto.interfaz || ''}</div>`;
        } else if (categoria === 'fuentes_poder') {
            return `<div class="product-specs">Potencia: ${producto.potencia}W | Eficiencia: ${producto.eficiencia} | Modular: ${producto.modular}</div>`;
        }
        return '';
    }

    function renderProductos() {
        const grid = document.getElementById('productsGrid');
        if (!productos.length) {
            grid.innerHTML = '<div class="no-results">No hay productos en esta categoría</div>';
            return;
        }
        const catActual = subcategoria || (searchParam ? 'todos' : '');
        grid.innerHTML = productos.map(p => {
            return `
                <div class="product-card" onclick="location.href='producto-detalle.html?id=${p.id}'">
                    <div class="product-image"><img src="imagenes/${p.imagen}" alt="${p.nombre}" onerror="this.src='imagenes/placeholder.jpg'"></div>
                    <div class="product-info">
                        <div class="product-title">${p.nombre}</div>
                        <div class="product-category">${p.marca}</div>
                        <div class="product-description" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${p.descripcion}</div>
                        ${getSpecsHTML(p, catActual)}
                        <div class="product-price">$${p.precio.toLocaleString()}</div>
                        <div style="display:flex; gap:8px;">
                            <button class="add-to-cart" onclick="event.stopPropagation(); agregarAlCarrito(${p.id})">Agregar al carrito</button>
                            <button class="btn-favorito" onclick="event.stopPropagation(); agregarAFavoritos(${p.id})">Favorito</button>
                        </div>
                    </div>
                </div>
            `;
        }).join('');
    }

    // Filtros de marca y otros específicos (se generan según productos actuales)
    function renderFilters() {
        if (!productos.length) return;
        const marcas = [...new Set(productos.map(p => p.marca))];
        const brandDiv = document.getElementById('brandFilters');
        brandDiv.innerHTML = marcas.map(m => `<div class="filter-option"><input type="checkbox" value="${m}" class="brand-filter"> <label>${m}</label></div>`).join('');
        
        const extraDiv = document.getElementById('extraFilterSection');
        if (subcategoria === 'procesadores') {
            const sockets = [...new Set(productos.map(p => p.socket))];
            extraDiv.innerHTML = `<h4>Socket</h4><div id="socketFilters">${sockets.map(s => `<div class="filter-option"><input type="checkbox" value="${s}" class="socket-filter"> <label>${s}</label></div>`).join('')}</div>`;
            extraDiv.style.display = 'block';
        } else {
            extraDiv.style.display = 'none';
        }
        document.querySelectorAll('.brand-filter').forEach(cb => cb.addEventListener('change', applyFilters));
        document.querySelectorAll('.socket-filter').forEach(cb => cb.addEventListener('change', applyFilters));
    }

    function applyFilters() {
        const selectedBrands = Array.from(document.querySelectorAll('.brand-filter:checked')).map(cb => cb.value);
        const selectedSockets = Array.from(document.querySelectorAll('.socket-filter:checked')).map(cb => cb.value);
        let filtered = productos;
        if (selectedBrands.length) filtered = filtered.filter(p => selectedBrands.includes(p.marca));
        if (selectedSockets.length && subcategoria === 'procesadores') filtered = filtered.filter(p => selectedSockets.includes(p.socket));
        const sortValue = document.getElementById('sortSelect').value;
        if (sortValue === 'asc') filtered.sort((a,b) => a.precio - b.precio);
        if (sortValue === 'desc') filtered.sort((a,b) => b.precio - a.precio);
        const grid = document.getElementById('productsGrid');
        if (!filtered.length) { grid.innerHTML = '<div class="no-results">No hay productos con esos filtros</div>'; return; }
        const catActual = subcategoria || (searchParam ? 'todos' : '');
        grid.innerHTML = filtered.map(p => `<div class="product-card" onclick="location.href='producto-detalle.html?id=${p.id}'">
                        <div class="product-image"><img src="imagenes/${p.imagen}" alt="${p.nombre}"></div>
                        <div class="product-info">
                            <div class="product-title">${p.nombre}</div>
                            <div class="product-category">${p.marca}</div>
                            <div class="product-description" style="display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden;">${p.descripcion}</div>
                            ${getSpecsHTML(p, catActual)}
                            <div class="product-price">$${p.precio.toLocaleString()}</div>
                            <div style="display:flex; gap:8px;"><button class="add-to-cart" onclick="event.stopPropagation(); agregarAlCarrito(${p.id})">Agregar</button><button class="btn-favorito" onclick="event.stopPropagation(); agregarAFavoritos(${p.id})">Favorito</button></div>
                        </div>
                    </div>`).join('');
    }

    window.agregarAlCarrito = (id) => {
        const prod = getProductById(id);
        if (prod) {
            let cart = JSON.parse(localStorage.getItem('carrito')) || [];
            const exist = cart.find(i => i.id === id);
            if (exist) exist.cantidad = (exist.cantidad || 1) + 1;
            else cart.push({ ...prod, cantidad: 1 });
            localStorage.setItem('carrito', JSON.stringify(cart));
            alert(`${prod.nombre} agregado al carrito`);
        }
    };
    window.agregarAFavoritos = (id) => {
        const prod = getProductById(id);
        if (prod) {
            let fav = JSON.parse(localStorage.getItem('favoritos')) || [];
            if (!fav.find(f => f.id === id)) {
                fav.push(prod);
                localStorage.setItem('favoritos', JSON.stringify(fav));
                alert(`${prod.nombre} agregado a favoritos`);
            } else alert('Ya está en favoritos');
        }
    };

    document.getElementById('sortSelect').addEventListener('change', applyFilters);
    document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        if (subcategoria) productos = productosDB[subcategoria] || [];
        else productos = getAllProducts();
        productos = productos.filter(p => p.nombre.toLowerCase().includes(term));
        renderFilters();
        applyFilters();
        renderProductos();
    });

    // Inicializar todo
    generarEnlacesCategorias();
    renderFilters();
    renderProductos();

    const currentUser = JSON.parse(localStorage.getItem('currentUser'));
    if (currentUser) document.getElementById('userNameDisplay').textContent = currentUser.name;

    document.getElementById('searchInput').addEventListener('keypress', (e) => {
        if (e.key === 'Enter') window.location.href = `productos-lista.html?buscar=${encodeURIComponent(e.target.value)}`;
    });

    const floatingButton = document.querySelector('.floating-button');
    const floatingMenu = document.querySelector('.floating-menu');
    if (floatingButton && floatingMenu) {
        floatingButton.addEventListener('click', (e) => { e.stopPropagation(); floatingMenu.classList.toggle('show'); });
        document.addEventListener('click', (e) => { if (!floatingButton.contains(e.target) && !floatingMenu.contains(e.target)) floatingMenu.classList.remove('show'); });
    }
</script>
</body>
</html>
